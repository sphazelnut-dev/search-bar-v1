<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>

<style>
body {
  margin: 0;
  background: #0B132B;
  color: #eee;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: translateY(-6%);
  animation: fadeIn 0.4s ease;
}

.logo {
  font-size: 64px;
  margin-bottom: 25px;
  opacity: 0.9;
  animation: fadeUp 0.5s ease;
}

.search-box {
  width: 580px;
  max-width: 90vw;
  height: 48px;
  border-radius: 999px;
  background: rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.4);
  transition: 0.2s;
  animation: fadeUp 0.6s ease;
}

.search-box:hover,
.search-box:focus-within {
  background: rgba(255,255,255,0.18);
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  transform: scale(1.02);
}

.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 16px;
}

.shortcuts {
  margin-top: 30px;
  width: 600px;
  max-width: 90vw;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  animation: fadeUp 0.7s ease;
}

.shortcut {
  width: 110px;
  height: 110px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
  animation: popIn 0.3s ease;
}

.shortcut:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-4px) scale(1.05);
}

.icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: rgba(255,255,255,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.2s;
}

.shortcut:hover .icon {
  background: rgba(255,255,255,0.18);
}

.icon img {
  width: 70%;
  height: 70%;
  object-fit: contain;
}

.shortcut span {
  margin-top: 8px;
  font-size: 13px;
  opacity: 0.85;
  text-align: center;
}

.add-tile {
  font-size: 26px;
  color: rgba(255,255,255,0.7);
}

.menu {
  position: absolute;
  top: 6px;
  right: 6px;
  opacity: 0;
  transition: 0.15s;
  font-size: 16px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
}

.shortcut:hover .menu {
  opacity: 1;
}

.menu:hover {
  color: white;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.2s ease;
}

.hidden {
  display: none;
}

.modal-content {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  width: 320px;
  animation: popIn 0.2s ease;
}

.modal-content input {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

.modal-actions {
  display: flex;
  justify-content: space-between;
}

.danger {
  background: #b80c00;
  color: white;
}

@keyframes fadeIn {
  from { opacity: 0 }
  to { opacity: 1 }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">Search</div>

  <form id="search-form">
    <div class="search-box">
      <input id="search-input" placeholder="Search or type a URL" autocomplete="off"/>
    </div>
  </form>

  <div id="shortcuts" class="shortcuts"></div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Add Shortcut</h3>
    <input id="name-input" placeholder="Name"/>
    <input id="url-input" placeholder="https://example.com"/>
    <div class="modal-actions">
      <button id="save-btn">Save</button>
      <button id="delete-btn" class="danger hidden">Delete</button>
      <button id="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script>
const form = document.getElementById("search-form");
const input = document.getElementById("search-input");
const shortcutsDiv = document.getElementById("shortcuts");

const modal = document.getElementById("modal");
const nameInput = document.getElementById("name-input");
const urlInput = document.getElementById("url-input");
const deleteBtn = document.getElementById("delete-btn");

let editingIndex = null;

// premade shortcuts
const defaultShortcuts = [
  { name: "YouTube", url: "https://youtube.com", icon: "youtube.png" },
  { name: "GitHub", url: "https://github.com", icon: "github.png" },
  { name: "Reddit", url: "https://reddit.com", icon: "reddit.png" }
];

function loadShortcuts() {
  return JSON.parse(localStorage.getItem("shortcuts")) || defaultShortcuts;
}

function saveShortcuts(data) {
  localStorage.setItem("shortcuts", JSON.stringify(data));
}

function render() {
  const data = loadShortcuts();
  shortcutsDiv.innerHTML = "";

  data.forEach((s, i) => {
    const el = document.createElement("div");
    el.className = "shortcut";

    el.innerHTML = `
      <div class="menu">⋮</div>
      <div class="icon">
        <img src="assets/${s.icon || 'default.png'}" onerror="this.src='assets/default.png'">
      </div>
      <span>${s.name}</span>
    `;

    el.onclick = (e) => {
      if (e.target.classList.contains("menu")) return;
      window.location.href = s.url;
    };

    el.querySelector(".menu").onclick = (e) => {
      e.stopPropagation();
      openModal(i);
    };

    el.oncontextmenu = (e) => {
      e.preventDefault();
      openModal(i);
    };

    shortcutsDiv.appendChild(el);
  });

  const add = document.createElement("div");
  add.className = "shortcut";
  add.innerHTML = `<div class="icon add-tile">+</div><span>Add</span>`;
  add.onclick = () => openModal();

  shortcutsDiv.appendChild(add);
}

function openModal(index = null) {
  editingIndex = index;

  if (index !== null) {
    const s = loadShortcuts()[index];
    nameInput.value = s.name;
    urlInput.value = s.url;
    deleteBtn.classList.remove("hidden");
  } else {
    nameInput.value = "";
    urlInput.value = "";
    deleteBtn.classList.add("hidden");
  }

  modal.classList.remove("hidden");
}

document.getElementById("save-btn").onclick = () => {
  const data = loadShortcuts();

  const item = {
    name: nameInput.value,
    url: urlInput.value,
    icon: "default.png"
  };

  if (editingIndex === null) data.push(item);
  else data[editingIndex] = item;

  saveShortcuts(data);
  modal.classList.add("hidden");
  render();
};

deleteBtn.onclick = () => {
  const data = loadShortcuts();
  data.splice(editingIndex, 1);
  saveShortcuts(data);
  modal.classList.add("hidden");
  render();
};

document.getElementById("cancel-btn").onclick = () => {
  modal.classList.add("hidden");
};

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const v = input.value.trim();
  if (!v) return;

  const isURL = v.includes(".") && !v.includes(" ");

  if (isURL) {
    window.location.href = v.startsWith("http") ? v : "https://" + v;
  } else {
    window.location.href = "https://duckduckgo.com/?q=" + encodeURIComponent(v);
  }
});

render();
</script>

</body>
</html>
